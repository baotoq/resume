<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 274 47" fill="none">
  <!-- A - teal -->
  <text x="0" y="45"
    font-family="'Arial Rounded MT Bold', 'Nunito', 'Varela Round', Arial, sans-serif"
    font-size="60" font-weight="900" fill="#00adab">A</text>
  <!-- S - Chelsea Gem -->
  <text x="45" y="35"
    font-family="'Arial Rounded MT Bold', 'Nunito', 'Varela Round', Arial, sans-serif"
    font-size="45" font-weight="900" fill="#f5921e">S</text>
  <!-- orange bar below S -->
  <rect x="48" y="39" width="25" height="7" rx="3.5" fill="#f5921e"/>
  <!-- WHITE - Deep Cerulean -->
  <text x="77" y="45"
    font-family="'Arial Rounded MT Bold', 'Nunito', 'Varela Round', Arial, sans-serif"
    font-size="60" font-weight="900" fill="#0086b0">WHITE</text>
</svg>


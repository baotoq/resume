name: ci
on:
  push:
    branches: ["master"]
    paths-ignore:
      - "public/*.pdf"
  pull_request:
    branches: ["master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PHONE: ${{ secrets.PHONE }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run test
      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        env:
          # The browser download has no idle timeout by default; on the CI runner a
          # stalled connection to cdn.playwright.dev hung the job for hours. Bound each
          # connection and retry on a fresh one so a transient stall self-heals (and the
          # first green run finally populates the cache, so later runs skip this entirely).
          PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT: "60000"
        run: |
          for attempt in 1 2 3; do
            echo "::group::playwright install (attempt ${attempt}/3)"
            if timeout --kill-after=30s 4m pnpm exec playwright install --with-deps chromium; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "attempt ${attempt} stalled or failed — retrying with a fresh connection…"
            sleep 5
          done
          echo "::error::playwright browser install failed after 3 attempts"
          exit 1
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        timeout-minutes: 6
        run: pnpm exec playwright install-deps chromium
      - run: pnpm run build
      - name: Run E2E
        run: pnpm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
      - name: Detect PDF source changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: pdf-changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            sources:
              - 'src/**'
              - 'public/fonts/**'
              - 'next.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
      - name: Build PDFs
        if: |
          github.event_name == 'push'
          && github.ref == 'refs/heads/master'
          && steps.pdf-changes.outputs.sources == 'true'
        run: pnpm run build:pdf
      - name: Commit regenerated PDFs
        if: |
          github.event_name == 'push'
          && github.ref == 'refs/heads/master'
          && steps.pdf-changes.outputs.sources == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/*.pdf
          if git diff --staged --quiet; then
            echo "No PDF changes to commit"
          else
            git commit -m "chore: regenerate resume PDFs"
            git push
          fi

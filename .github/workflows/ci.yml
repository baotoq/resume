name: ci
on:
  push:
    branches: ["master"]
    paths-ignore:
      - "public/*.pdf"
  pull_request:
    branches: ["master"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run inside Playwright's official image: Chromium (used by both the e2e
    # suite and build:pdf) is preinstalled, so CI never downloads it from
    # cdn.playwright.dev. That download has no idle timeout and stalls on GitHub
    # runners, repeatedly hanging the job until the timeout fired.
    # The tag MUST stay pinned to the @playwright/test version in package.json
    # (1.59.1). On mismatch Playwright fails fast ("executable doesn't exist"),
    # so drift is loud, not a silent stall — bump both together.
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user 1001
    permissions:
      contents: write
    env:
      EMAIL: ${{ secrets.EMAIL }}
      PHONE: ${{ secrets.PHONE }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run test
      - name: Cache Next.js build
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-
      - run: pnpm run build
      - name: Run E2E
        run: pnpm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7
      - name: Detect PDF source changes
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: pdf-changes
        uses: dorny/paths-filter@v4
        with:
          filters: |
            sources:
              - 'src/**'
              - 'public/fonts/**'
              - 'next.config.ts'
              - 'package.json'
              - 'pnpm-lock.yaml'
      - name: Build PDFs
        if: |
          github.event_name == 'push'
          && github.ref == 'refs/heads/master'
          && steps.pdf-changes.outputs.sources == 'true'
        run: pnpm run build:pdf
      - name: Commit regenerated PDFs
        if: |
          github.event_name == 'push'
          && github.ref == 'refs/heads/master'
          && steps.pdf-changes.outputs.sources == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/*.pdf
          if git diff --staged --quiet; then
            echo "No PDF changes to commit"
          else
            git commit -m "chore: regenerate resume PDFs"
            git push
          fi
